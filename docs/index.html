<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>James Seymour | Interactive Portfolio</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #101312;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #101312;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        background: #231F20;
      }

      #unity-loading-overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #f2f6f3;
        background: #101312;
        transition: opacity 220ms ease;
        z-index: 10;
      }

      #unity-loading-overlay.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .portfolio-loader {
        width: min(360px, calc(100vw - 48px));
      }

      .portfolio-loader-title {
        margin: 0 0 18px;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.35;
        text-align: center;
      }

      .portfolio-loader-track {
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #26302d;
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: #55d6a5;
        transition: width 120ms ease-out;
      }

      #unity-progress-label {
        margin-top: 12px;
        font-size: 13px;
        line-height: 1.3;
        text-align: center;
        color: #b9c6bf;
      }

      #unity-warning {
        position: fixed;
        top: 16px;
        left: 50%;
        width: min(560px, calc(100vw - 32px));
        transform: translateX(-50%);
        display: none;
        z-index: 20;
      }

      #unity-warning div {
        margin-bottom: 8px;
        padding: 10px 12px;
        border-radius: 6px;
        color: #101312;
        background: #f1d56a;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      }

      #unity-warning div.error {
        color: #fff;
        background: #b83d4b;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-overlay" aria-live="polite">
        <div class="portfolio-loader">
          <p class="portfolio-loader-title">Loading Interactive Portfolio...</p>
          <div class="portfolio-loader-track">
            <div id="unity-progress-bar-full"></div>
          </div>
          <div id="unity-progress-label">0%</div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loadingOverlay = document.querySelector("#unity-loading-overlay");
      const progressBar = document.querySelector("#unity-progress-bar-full");
      const progressLabel = document.querySelector("#unity-progress-label");

      function resizeCanvasToViewport() {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      function unityShowBanner(msg, type) {
        const warningBanner = document.querySelector("#unity-warning");
        const message = document.createElement("div");
        message.textContent = msg;
        if (type === "error") {
          message.className = "error";
        }

        warningBanner.appendChild(message);
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";

        if (type !== "error") {
          window.setTimeout(() => {
            warningBanner.removeChild(message);
            warningBanner.style.display = warningBanner.children.length ? "block" : "none";
          }, 5000);
        }
      }

      resizeCanvasToViewport();
      window.addEventListener("resize", resizeCanvasToViewport);

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/docs.loader.js";
      const config = {
        arguments: [],
        dataUrl: buildUrl + "/docs.data",
        frameworkUrl: buildUrl + "/docs.framework.js",
        codeUrl: buildUrl + "/docs.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "James Seymour",
        productVersion: "0.1.0",
        showBanner: unityShowBanner
      };


      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          const percent = Math.round(progress * 100);
          progressBar.style.width = percent + "%";
          progressLabel.textContent = percent + "%";
        }).then((unityInstance) => {
          window.portfolioUnityInstance = unityInstance;
          loadingOverlay.classList.add("is-hidden");
          window.setTimeout(() => loadingOverlay.remove(), 260);
        }).catch((message) => {
          progressLabel.textContent = "Load failed";
          unityShowBanner(message, "error");
          console.error(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
