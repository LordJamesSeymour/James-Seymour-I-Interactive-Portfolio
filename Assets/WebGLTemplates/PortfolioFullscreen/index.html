<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="stylesheet" href="TemplateData/style.css?v=portfolio-fullscreen-20260605">
#if SHOW_DIAGNOSTICS
    <link rel="stylesheet" href="<<<TemplateData/diagnostics.css>>>">
    <script src="<<<TemplateData/diagnostics.js>>>"></script>
#endif
#if DEVELOPMENT_PLAYER
    <script src="<<<TemplateData/profiler.js>>>"></script>
#endif
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-loading-text">0%</div>
      </div>
      <div id="unity-warning"> </div>
#if SHOW_DIAGNOSTICS
      <img id="diagnostics-icon" src="TemplateData/webmemd-icon.png">
#endif
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityContainer = document.querySelector("#unity-container");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var loadingText = document.querySelector("#unity-loading-text");

      function fitGameToViewport() {
        unityContainer.style.position = "fixed";
        unityContainer.style.inset = "0";
        unityContainer.style.left = "0";
        unityContainer.style.top = "0";
        unityContainer.style.width = "100vw";
        unityContainer.style.height = "100vh";
        unityContainer.style.transform = "none";
        canvas.style.display = "block";
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      window.addEventListener("resize", fitGameToViewport);
      window.addEventListener("orientationchange", fitGameToViewport);
      fitGameToViewport();

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") div.style = "background: red; padding: 10px;";
        else {
          if (type == "warning") div.style = "background: yellow; padding: 10px;";
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var buildCacheBust = String(Date.now());

      function withBuildVersion(url) {
        return url + "?v=" + encodeURIComponent(buildCacheBust);
      }

      var loaderUrl = withBuildVersion(buildUrl + "/{{{ LOADER_FILENAME }}}");
      var config = {
        arguments: [],
        dataUrl: withBuildVersion(buildUrl + "/{{{ DATA_FILENAME }}}"),
        frameworkUrl: withBuildVersion(buildUrl + "/{{{ FRAMEWORK_FILENAME }}}"),
#if USE_THREADS
        workerUrl: withBuildVersion(buildUrl + "/{{{ WORKER_FILENAME }}}"),
#endif
#if USE_WASM
        codeUrl: withBuildVersion(buildUrl + "/{{{ CODE_FILENAME }}}"),
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: withBuildVersion(buildUrl + "/{{{ SYMBOLS_FILENAME }}}"),
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: buildCacheBust,
        cacheControl: function(url) {
          return "no-store";
        },
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        unityContainer.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        unityContainer.className = "unity-desktop";
      }

#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif

      fitGameToViewport();
      loadingBar.style.display = "flex";

      function updateLoadingProgress(progress) {
        var percent = Math.round(100 * progress);
        progressBarFull.style.width = percent + "%";
        loadingText.textContent = percent + "%";
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, updateLoadingProgress).then((unityInstance) => {
          updateLoadingProgress(1);
          fitGameToViewport();
          loadingBar.style.display = "none";
#if SHOW_DIAGNOSTICS
          document.getElementById("diagnostics-icon").onclick = () => {
            unityDiagnostics.openDiagnosticsDiv(unityInstance.GetMetricsInfo);
          };
#endif
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
